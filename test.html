<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성격 검사 중... 🎯 | 어린이 MBTI</title>
    <meta name="description" content="어린이 MBTI 성격 검사 질문에 답하고 나의 성격 유형을 확인해 보세요.">
    <meta name="robots" content="noindex,follow">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/test.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script>
    window.adsbygoogle = window.adsbygoogle || [];
    window.adsbygoogle.requestNonPersonalizedAds = 1;
</script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3303070081473891" crossorigin="anonymous"></script>
</head>
<body>

<!-- 네비게이션 -->
<nav class="site-nav">
    <div class="nav-inner">
        <a href="index.html" class="nav-logo">
            <span class="nav-logo-icon">🌟</span>
            <span>어린이 MBTI</span>
        </a>
        <button class="nav-toggle" id="navToggle" aria-label="메뉴 열기">
            <span></span><span></span><span></span>
        </button>
        <div class="nav-links" id="navLinks">
            <a href="index.html">홈</a>
            <a href="about.html">소개</a>
            <a href="articles/index.html">MBTI 정보</a>
            <a href="contact.html">문의</a>
            <a href="privacy.html">개인정보</a>
        </div>
    </div>
</nav>

<!-- 퀴즈 메인 -->
<main class="test-main">
    <div class="container">
        <!-- 진행률 바 -->
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
            <div class="progress-text" id="progressText">1 / 16</div>
        </div>

        <!-- 질문 영역 -->
        <div class="question-container">
            <div class="question-number" id="questionNumber">질문 1</div>
            <h2 class="question-text" id="questionText"></h2>
        </div>

        <!-- 선택지 -->
        <div class="options-container" id="optionsContainer">
            <!-- JavaScript로 동적 생성 -->
        </div>

        <!-- 네비게이션 버튼 -->
        <div class="nav-buttons">
            <button class="nav-btn prev-btn" id="prevBtn" onclick="prevQuestion()" disabled>
                ← 이전
            </button>
            <button class="nav-btn next-btn" id="nextBtn" onclick="nextQuestion()" disabled>
                다음 →
            </button>
        </div>
    </div>
</main>

<script>
    // 햄버거 메뉴
    const navToggle = document.getElementById('navToggle');
    const navLinks = document.getElementById('navLinks');
    navToggle.addEventListener('click', () => {
        navToggle.classList.toggle('open');
        navLinks.classList.toggle('open');
    });
    document.addEventListener('click', (e) => {
        if (!navToggle.contains(e.target) && !navLinks.contains(e.target)) {
            navToggle.classList.remove('open');
            navLinks.classList.remove('open');
        }
    });
</script>
<script src="js/questions.js"></script>
<script src="js/test.js"></script>
</body>
</html>
